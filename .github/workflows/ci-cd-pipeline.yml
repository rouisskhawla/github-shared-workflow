name: Reusable CI CD Pipeline

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      service-dir:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: '17'
      service-type:
        required: false
        type: string
        default: 'backend'

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      KUBECONFIG_DEV:
        required: true
      KUBECONFIG_PROD:
        required: true

jobs:
  build:
    runs-on: self-hosted
    outputs:
      image-tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v3

      - name: Compute version
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BUILD_NUMBER=${{ github.run_number }}
          if [ "${{ github.ref_name }}" == "dev" ]; then
            TAG="1.0.${BUILD_NUMBER}-dev-${SHORT_SHA}"
          else
            TAG="1.0.${BUILD_NUMBER}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Computed version: ${TAG}"
      
      - name: Set up JDK
        if: inputs.service-type == 'backend'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Build (backend)
        if: inputs.service-type == 'backend'
        working-directory: ${{ inputs.service-dir }}
        run: mvn clean package -DskipTests

      - name: Build (frontend)
        if: inputs.service-type == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (frontend)
        if: inputs.service-type == 'frontend'
        working-directory: ${{ inputs.service-dir }}
        run: npm ci

      - name: Build frontend dev
        if: inputs.service-type == 'frontend' && github.ref_name == 'dev'
        working-directory: ${{ inputs.service-dir }}
        run: npm run build -- --configuration development

      - name: Build frontend prod
        if: inputs.service-type == 'frontend' && github.ref_name != 'dev'
        working-directory: ${{ inputs.service-dir }}
        run: npm run build -- --configuration production

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build and push
        working-directory: ${{ inputs.service-dir }}
        run: |
          docker build -t ${{ inputs.docker-image }}:${{ steps.version.outputs.tag }} .
          docker push ${{ inputs.docker-image }}:${{ steps.version.outputs.tag }}
          if [ "${{ github.ref_name }}" == "main" ]; then
            docker tag ${{ inputs.docker-image }}:${{ steps.version.outputs.tag }} \
                       ${{ inputs.docker-image }}:latest
            docker push ${{ inputs.docker-image }}:latest
          fi
  deploy:
    runs-on: self-hosted
    needs: build
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy variables
        id: vars
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "namespace=prod"            >> $GITHUB_OUTPUT
            echo "values-file=values-prod.yaml" >> $GITHUB_OUTPUT
            echo "env-name=PRODUCTION"       >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "dev" ]; then
            echo "namespace=dev"             >> $GITHUB_OUTPUT
            echo "values-file=values-dev.yaml"  >> $GITHUB_OUTPUT
            echo "env-name=DEVELOPMENT"      >> $GITHUB_OUTPUT
          else
            echo "Unsupported branch: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          else
            echo "${{ secrets.KUBECONFIG_DEV }}"  | base64 -d > $HOME/.kube/config
          fi
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ steps.vars.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          helm upgrade --install ${{ inputs.service-name }} charts/microservice \
            -f helm-values/${{ inputs.service-name }}/${{ steps.vars.outputs.values-file }} \
            --set global.imageTag=${{ needs.build.outputs.image-tag }} \
            --namespace ${{ steps.vars.outputs.namespace }} \
            --create-namespace

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} \
            -n ${{ steps.vars.outputs.namespace }} \
            --timeout=5m

      - name: Deployment status
        run: |
          kubectl get pods    -n ${{ steps.vars.outputs.namespace }}
          kubectl get svc     -n ${{ steps.vars.outputs.namespace }}
          kubectl get ingress -n ${{ steps.vars.outputs.namespace }}